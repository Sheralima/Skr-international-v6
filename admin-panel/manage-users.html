<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="../style.css">

</head>

<body>


<header class="dashboard-header">

<h2>SKR INTERNATIONAL Admin</h2>

<a href="admin-dashboard.html">Dashboard</a>

</header>



<section class="admin-section">


<h1>Manage Users</h1>
<p>Total Users: <span id="totalUsers">0</span></p>

<input type="text" id="searchUser" placeholder="Search User...">

<br><br>

<table id="usersTable">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>


<tr>

<td>001</td>

<td>Demo User</td>

<td>user@email.com</td>

<td>Active</td>

<td>
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
</td>

</tr>


<tr>

<td>002</td>

<td>New Member</td>

<td>member@email.com</td>

<td>Active</td>

<td>
<button>Edit</button>
<button>Delete</button>
</td>

</tr>


</table>


</section>


<script src="../js/manage-users.js"></script>

</html>
