<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Demo</title>

<link rel="stylesheet" href="css/animation.css">

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
}

.box{
    max-width:900px;
    margin:50px auto;
    padding:40px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.spacer{
    height:300px;
}
</style>

</head>
<body>

<div class="spacer"></div>

<section class="box animate">
    <h2>About SKR INTERNATIONAL</h2>
    <p>This section will animate when it comes into view.</p>
</section>

<div class="spacer"></div>

<section class="box animate">
    <h2>Our Services</h2>
    <p>Professional Business Solutions for Everyone.</p>
</section>

<div class="spacer"></div>

<section class="box animate">
    <h2>Contact Us</h2>
    <p>Get in touch with our team anytime.</p>
</section>

<script src="js/animation.js"></script>

</body>
</html>
